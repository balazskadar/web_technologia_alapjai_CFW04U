<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Git App - Repo kereső</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Repository keresés</h1>
    <input type="text" id="repo-search-input" placeholder="Repository elnevezése">
    <button class="btn btn-primary" id="search-btn">Keresés</button>
    <div id="result"></div>

    <script src="app.js"></script>
    <script>
        async function loadRepositories(searchText) {
            try {
                const res = await fetch('https://api.github.com/search/repositories?q=' + encodeURIComponent(searchText), {
                    headers: { 'Authorization': 'Bearer ' + GH_ACCESS_TOKEN }
                });
                const data = await res.json();
                const resultDiv = document.querySelector('#result');
                resultDiv.innerHTML = '';
                for (const repo of data.items) {
                    resultDiv.innerHTML += `
                        <div class="card">
                            <p><strong>${repo.full_name}</strong></p>
                            <p>${repo.description || 'Nincs leírás'}</p>
                        </div>`;
                }
            } catch (err) { alert('Hiba történt.'); }
        }
        document.querySelector('#search-btn').addEventListener('click', () => {
            loadRepositories(document.querySelector('#repo-search-input').value);
        });
    </script>
</body>
</html>
