<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Git App - Felhasználó kereső</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Felhasználó keresés</h1>
    <input type="text" id="user-search-input" placeholder="Felhasználónév">
    <button class="btn btn-primary" id="search-btn">Keresés</button>
    <div id="result"></div>

    <script src="app.js"></script>
    <script>
        async function loadUsers(searchText) {
            if (!searchText.trim()) {
                alert('Kérlek, adj meg egy nevet!'); // 7. heti feltétel
                return;
            }
            try {
                const res = await fetch('https://api.github.com/search/users?q=' + encodeURIComponent(searchText), {
                    headers: { 'Authorization': 'Bearer ' + GH_ACCESS_TOKEN }
                });
                const data = await res.json();
                const resultDiv = document.querySelector('#result');
                resultDiv.innerHTML = '';

                for (const user of data.items) {
                    // Itt alakítjuk linkké az adatlaphoz (8. heti feladat)
                    resultDiv.innerHTML += `
                        <a href="user.html?id=${user.login}" style="text-decoration: none; color: inherit;">
                            <div class="card user-card">
                                <img src="${user.avatar_url}" class="avatar">
                                <p><strong>${user.login}</strong></p>
                            </div>
                        </a>`;
                }
            } catch (err) { alert('Hiba a keresés során.'); }
        }
        document.querySelector('#search-btn').addEventListener('click', () => {
            loadUsers(document.querySelector('#user-search-input').value);
        });
    </script>
</body>
</html>
