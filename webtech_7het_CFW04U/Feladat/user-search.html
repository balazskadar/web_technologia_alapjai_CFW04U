<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git App - Felhasználó kereső</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .user-card {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <h1>Felhasználó keresés</h1>

    <input type="text" id="user-search-input" placeholder="Keresett felhasználónév">
    <button class="btn btn-primary" id="search-btn">Keresés</button>

    <div id="result"></div>

    <script src="app.js"></script>
    <script>
        async function loadUsers(searchText) {
            try {
                const res = await fetch('https://api.github.com/search/users?q=' 
                    + encodeURIComponent(searchText), {
                        headers: {
                            'Authorization': 'Bearer ' + GH_ACCESS_TOKEN
                        }
                    });
                
                if (!res.ok) {
                    throw Error('Hibás válasz, státuszkód:' + res.status);
                }

                const data = await res.json();
                const resultDiv = document.querySelector('#result');
                resultDiv.innerHTML = '';

                if (data.items.length === 0) {
                    resultDiv.innerHTML = '<p>Nem található ilyen felhasználó.</p>';
                    return;
                }

                for (const user of data.items) {
                    const userHtml = `
                        <div class="card user-card">
                            <img src="${user.avatar_url}" alt="${user.login} profilképe" class="avatar">
                            <p><strong>${user.login}</strong></p>
                        </div>
                    `;
                    resultDiv.innerHTML += userHtml;
                }
            } catch (err) {
                console.error(err);
                alert('Hiba történt a keresés során.');
            }
        }

        const searchBtn = document.querySelector('#search-btn');
        searchBtn.addEventListener('click', () => {
            const inputElem = document.querySelector('#user-search-input');
            const searchText = inputElem.value.trim();

            if (searchText === '') {
                alert('Kérlek, adj meg egy keresőkifejezést!');
                return;
            }

            loadUsers(searchText);
        });
    </script>
</body>
</html>
