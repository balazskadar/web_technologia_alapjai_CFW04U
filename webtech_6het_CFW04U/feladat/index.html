<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teendő Lista</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <div class="card" style="margin-top: 50px; max-width: 600px; margin-left: auto; margin-right: auto;">
            <h1>Teendőim</h1>
            
            <div class="row">
                <div class="col-3">
                    <input type="text" id="todo-input" placeholder="Írd be az új teendőt...">
                </div>
                <div class="col">
                    <button class="btn btn-primary" id="add-btn" style="width: 100%; margin: 5px 0;">Hozzáadás</button>
                </div>
            </div>

            <ul id="todo-list"></ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
